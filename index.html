<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>護渠大師</title>
    <script src="https://unpkg.com/ml5@0.4.3/dist/ml5.min.js"></script>
    <style>
        /* 模仿設計圖的點狀背景與字體 */
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            text-align: center;
            background-color: #f5f0e6;
            background-image: radial-gradient(#d3cabc 1px, transparent 1px);
            background-size: 20px 20px;
            margin: 0;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none; /* 防止小學生狂按選取文字 */
            -webkit-touch-callout: none; /* 禁用 iOS 長按選單 */
        }

        /* 頂部深啡色大標題區塊 */
        .header-box {
            background-color: #634739;
            color: white;
            width: 800px;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-box h1 { margin: 0; font-size: 32px; letter-spacing: 2px; }

        #connectSerialBtn {
            background-color: #e67e22; color: white; border: none; padding: 10px 20px;
            font-size: 16px; font-weight: bold; border-radius: 20px; cursor: pointer; transition: 0.3s;
        }
        #connectSerialBtn:hover { background-color: #d35400; }
        #connectSerialBtn:disabled { background-color: #27ae60; cursor: default; }

        /* 主畫面佈局：左邊鏡頭區，右邊按鈕區 */
        .main-display {
            display: flex; justify-content: center; align-items: flex-start; gap: 20px; margin-bottom: 20px;
        }

        /* 左側白色卡片 */
        .left-panel {
            background-color: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 440px;
        }

        #loadingMsg { color: #e74c3c; font-weight: bold; font-size: 16px; margin-bottom: 10px; }

        /* 鏡頭外框 */
        #camera-container {
            border: 8px solid #73574b; border-radius: 4px; background-color: #000; margin-bottom: 15px; overflow: hidden;
        }
        video { display: block; width: 400px; height: 300px; object-fit: cover; transform: scaleX(1); transition: transform 0.3s;}

        .cam-controls { display: flex; gap: 10px; margin-bottom: 15px; }
        
        #toggleBtn {
            background-color: #347b38; color: white; border: none; padding: 12px; font-size: 18px;
            font-weight: bold; border-radius: 8px; cursor: pointer; flex: 1; transition: 0.3s;
        }
        #toggleBtn.stop { background-color: #c0392b; }
        
        #flipBtn {
            background-color: #7f8c8d; color: white; border: none; padding: 12px; font-size: 16px;
            font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s;
        }

        /* 右側按鈕區 */
        .side-panel { display: flex; flex-direction: column; gap: 10px; width: 280px; }

        select {
            padding: 12px; font-size: 16px; border-radius: 8px; border: 2px solid #bdc3c7;
            font-weight: bold; color: #2c3e50; cursor: pointer; margin-bottom: 10px;
        }

        .learn-btn {
            color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold;
            padding: 15px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            background-color: #f39c12; touch-action: none; /* 禁用原生的觸控滑動操作 */
        }
        .learn-btn:active { transform: translateY(4px); box-shadow: 0 0 0 rgba(0,0,0,0.2); }
        .learn-btn:disabled { background-color: #bdc3c7; cursor: not-allowed; transform: none; box-shadow: none; }

        /* 表格與日誌區塊 */
        .bottom-section { width: 800px; display: flex; flex-direction: column; gap: 15px; }

        table {
            width: 100%; border-collapse: collapse; background: white; border-radius: 8px;
            overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        th, td { padding: 12px; border: 1px solid #ecf0f1; text-align: center; font-size: 16px; }
        th { background-color: #634739; color: white; }
        td { font-weight: bold; color: #2c3e50; }

        .msg-log {
            background-color: #fff; padding: 15px; border-radius: 8px; font-size: 16px;
            color: #2c3e50; border: 2px solid #bdc3c7; text-align: left; font-weight: bold;
        }
        .msg-log span { color: #e67e22; font-size: 18px; }
        .cooldown-text { float: right; color: #7f8c8d; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header-box">
        <h1>護渠大師</h1>
        <button id="connectSerialBtn">◀ 連接 Micro:bit</button>
    </div>

    <div class="main-display">
        <div class="left-panel">
            <div id="loadingMsg">🔄 AI 模型載入中，請稍候...</div>
            <div id="camera-container">
                <video id="webcam" width="400" height="300" autoplay playsinline muted></video>
            </div>
            <div class="cam-controls">
                <button id="toggleBtn">▶ 開始辨認</button>
                <button id="flipBtn">↔ 水平翻轉</button>
            </div>
        </div>

        <div class="side-panel">
            <select id="modeSelect">
                <option value="inspect">🔍 檢視模式 (只辨認 Class 1-2)</option>
                <option value="clear">🧹 清除模式 (只辨認 Class 3-4, 背景)</option>
            </select>
            
            <button class="learn-btn" id="btn-class1">學習 Class 1 (渠管)</button>
            <button class="learn-btn" id="btn-class2">學習 Class 2 (裂縫)</button>
            <button class="learn-btn" id="btn-class3">學習 Class 3 (污泥)</button>
            <button class="learn-btn" id="btn-class4">學習 Class 4 (樹葉)</button>
            <button class="learn-btn" id="btn-bg" style="background-color:#34495e;">學習 背景</button>
        </div>
    </div>

    <div class="bottom-section">
        <table>
            <thead>
                <tr>
                    <th>類別 (Class)</th>
                    <th>相似度 (%)</th>
                    <th>已學習相片數量</th>
                </tr>
            </thead>
            <tbody id="statsBody">
                </tbody>
        </table>

        <div class="msg-log">
            📤 傳送至 Micro:bit：<span id="msgSent">無</span>
            <div class="cooldown-text" id="cooldownText">冷卻時間: 0.0s</div>
        </div>
    </div>

    <script>
        // === 變數初始化 ===
        const classes = [
            { id: 'Class 1', name: 'Class 1 (渠管)' },
            { id: 'Class 2', name: 'Class 2 (裂縫)' },
            { id: 'Class 3', name: 'Class 3 (污泥)' },
            { id: 'Class 4', name: 'Class 4 (樹葉)' },
            { id: 'Background', name: '背景' }
        ];
        let counts = { 'Class 1': 0, 'Class 2': 0, 'Class 3': 0, 'Class 4': 0, 'Background': 0 };
        
        const video = document.getElementById('webcam');
        const toggleBtn = document.getElementById('toggleBtn');
        const flipBtn = document.getElementById('flipBtn');
        const connectSerialBtn = document.getElementById('connectSerialBtn');
        const msgSentSpan = document.getElementById('msgSent');
        const cooldownText = document.getElementById('cooldownText');
        
        let isFlipped = false;
        let isRecognizing = false;
        let isModelReady = false;
        
        let featureExtractor;
        let knn;
        let learnInterval;
        
        // Microbit 通訊變數
        let serialPort = null;
        let serialWriter = null;
        let lastSendTime = 0;
        const cooldownMs = 1000;

        // === 初始化 UI 表格 ===
        function renderTable() {
            const tbody = document.getElementById('statsBody');
            tbody.innerHTML = '';
            classes.forEach(c => {
                tbody.innerHTML += `
                    <tr>
                        <td>${c.name}</td>
                        <td id="conf-${c.id.replace(' ', '')}">0%</td>
                        <td id="count-${c.id.replace(' ', '')}">${counts[c.id]}</td>
                    </tr>
                `;
            });
            setLearnButtonsDisabled(true);
        }
        renderTable();

        function setLearnButtonsDisabled(disabled) {
            document.querySelectorAll('.learn-btn').forEach(btn => btn.disabled = disabled);
        }

        // === 1. 攝影機與 AI 模型設定 ===
        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 400, height: 300 } });
                video.srcObject = stream;
            } catch (error) { 
                alert("無法存取攝影機，請檢查瀏覽器權限。"); 
            }
        }
        setupCamera();

        // 初始化 ML5
        featureExtractor = ml5.featureExtractor('MobileNet', () => {
            isModelReady = true;
            document.getElementById('loadingMsg').innerText = "✅ AI 模型準備就緒！可以開始長按右方按鈕學習。";
            document.getElementById('loadingMsg').style.color = "#27ae60";
            setLearnButtonsDisabled(false); // 啟用學習按鈕
        });
        knn = ml5.KNNClassifier();

        // === 2. 綁定按鈕學習事件 (解決觸控長按失效問題) ===
        function attachLearningEvents(btnId, className) {
            const btn = document.getElementById(btnId);
            
            const handleStart = (e) => {
                e.preventDefault(); // 阻止反白文字或右鍵選單
                if (!isModelReady) return;
                
                // 按下立刻學習第一張
                addExample(className); 
                
                // 每 0.1 秒持續學習
                clearInterval(learnInterval); 
                learnInterval = setInterval(() => { addExample(className); }, 100);
            };
            
            const handleStop = (e) => {
                e.preventDefault();
                clearInterval(learnInterval);
            };

            // 滑鼠事件 (電腦)
            btn.addEventListener('mousedown', handleStart);
            btn.addEventListener('mouseup', handleStop);
            btn.addEventListener('mouseleave', handleStop);
            
            // 觸控事件 (平板/手機)
            btn.addEventListener('touchstart', handleStart, {passive: false});
            btn.addEventListener('touchend', handleStop, {passive: false});
            btn.addEventListener('touchcancel', handleStop, {passive: false});
        }

        attachLearningEvents('btn-class1', 'Class 1');
        attachLearningEvents('btn-class2', 'Class 2');
        attachLearningEvents('btn-class3', 'Class 3');
        attachLearningEvents('btn-class4', 'Class 4');
        attachLearningEvents('btn-bg', 'Background');

        // === 3. 核心學習功能 ===
        function addExample(className) {
            try {
                // 確保影片畫面已經成功載入 (寬度大於0)
                if (video.videoWidth === 0) return;
                
                // 提取影像特徵並加入 KNN
                const features = featureExtractor.infer(video);
                knn.addExample(features, className);
                
                // 更新數字
                counts[className]++;
                document.getElementById(`count-${className.replace(' ', '')}`).innerText = counts[className];
            } catch (err) {
                console.error("抓取影像學習時發生錯誤:", err);
            }
        }

        // === 4. 辨認與模式邏輯 ===
        flipBtn.addEventListener('click', () => {
            isFlipped = !isFlipped;
            video.style.transform = isFlipped ? 'scaleX(-1)' : 'scaleX(1)';
        });

        toggleBtn.addEventListener('click', () => {
            if (knn.getNumLabels() === 0) {
                alert("請先長按右方的黃色按鈕，為類別學習一些相片！");
                return;
            }
            isRecognizing = !isRecognizing;
            if (isRecognizing) {
                toggleBtn.innerHTML = "⏹ 停止辨認";
                toggleBtn.classList.add("stop");
                classify();
            } else {
                toggleBtn.innerHTML = "▶ 開始辨認";
                toggleBtn.classList.remove("stop");
                classes.forEach(c => updateConfidenceUI(c.id, 0));
            }
        });

        function classify() {
            if (!isRecognizing) return;

            try {
                const features = featureExtractor.infer(video);
                knn.classify(features, (err, result) => {
                    if (err) { console.error(err); return; }

                    let currentConfidences = result.confidencesByLabel;
                    
                    classes.forEach(c => {
                        let conf = currentConfidences[c.id] ? (currentConfidences[c.id] * 100).toFixed(1) : 0;
                        updateConfidenceUI(c.id, conf);
                    });

                    // 根據下拉選單模式篩選
                    const mode = document.getElementById('modeSelect').value;
                    let allowedClasses = mode === 'inspect' ? ['Class 1', 'Class 2'] : ['Class 3', 'Class 4', 'Background'];
                    
                    let bestClass = '';
                    let highestConf = 0;

                    allowedClasses.forEach(c => {
                        if (currentConfidences[c] && currentConfidences[c] > highestConf) {
                            highestConf = currentConfidences[c];
                            bestClass = c;
                        }
                    });

                    // 超過 50% 信心度，觸發傳送
                    if (bestClass && highestConf > 0.5) {
                        triggerMicrobit(bestClass);
                    }

                    // 循環辨認
                    setTimeout(classify, 150);
                });
            } catch (err) {
                console.error("辨認時發生錯誤：", err);
                setTimeout(classify, 500); // 出錯時延遲重試，防止當機
            }
        }

        function updateConfidenceUI(className, value) {
            document.getElementById(`conf-${className.replace(' ', '')}`).innerText = `${value}%`;
        }

        // === 5. Web Serial API 通訊 ===
        connectSerialBtn.addEventListener('click', async () => {
            if (!('serial' in navigator)) { alert("瀏覽器不支援 Web Serial API"); return; }
            try {
                serialPort = await navigator.serial.requestPort();
                await serialPort.open({ baudRate: 115200 });
                
                const textEncoder = new TextEncoderStream();
                textEncoder.readable.pipeTo(serialPort.writable);
                serialWriter = textEncoder.writable.getWriter();
                
                connectSerialBtn.innerText = "Micro:bit 已連接 ✅";
                connectSerialBtn.disabled = true;
            } catch (error) { 
                console.error("連接序列埠失敗:", error); 
                alert("連接失敗或被取消！");
            }
        });

        async function sendToMicrobit(text) {
            if (serialWriter) {
                try { await serialWriter.write(text + "\n"); } 
                catch (error) { console.error("寫入失敗:", error); }
            }
        }

        function triggerMicrobit(className) {
            const now = Date.now();
            if (now - lastSendTime < cooldownMs) return;

            let cmd = "";
            if (className === 'Class 1') cmd = "R1";
            else if (className === 'Class 2') cmd = "R2";
            else if (className === 'Class 3') cmd = "R3";
            else if (className === 'Class 4') cmd = "R4";
            else if (className === 'Background') cmd = "Background";

            if (cmd) {
                sendToMicrobit(cmd);
                msgSentSpan.innerText = cmd;
                lastSendTime = now;
            }
        }

        // === 6. 更新冷卻時間顯示 ===
        setInterval(() => {
            const now = Date.now();
            if (now - lastSendTime < cooldownMs) {
                let remaining = ((cooldownMs - (now - lastSendTime)) / 1000).toFixed(1);
                cooldownText.innerText = `冷卻中: ${remaining}s`;
                cooldownText.style.color = "#e74c3c";
            } else {
                cooldownText.innerText = "就緒";
                cooldownText.style.color = "#27ae60";
            }
        }, 100);

    </script>
</body>
</html>
